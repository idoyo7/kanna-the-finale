name: Docker Image Build & Update Manifest

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # 1. 레포지토리 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # 3. 무작위 태그 생성
      - name: Generate random tag for Docker image
        run: echo "IMAGE_TAG=$(date +%s | sha256sum | cut -c1-6)" >> $GITHUB_ENV

      # 4. Docker 이미지 빌드 및 푸시
      - name: Build and push Docker image
        run: |
          docker build -t "${{ secrets.DOCKERHUB_USERNAME }}/kanna:${{ env.IMAGE_TAG }}" .
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/kanna:${{ env.IMAGE_TAG }}"

      # 5. montstrap 레포 체크아웃 (GitOps 소스)
      - name: Checkout montstrap repository
        uses: actions/checkout@v4
        with:
          repository: idoyo7/montstrap
          token: ${{ secrets.MONTSTRAP_TOKEN }}
          path: montstrap
          ref: main

      # 6. montstrap stage kustomization.yaml 이미지 태그 갱신
      - name: Update stage image tag in montstrap
        working-directory: montstrap
        run: |
          KUSTOMIZATION=stage/kanna/manifests/kustomization.yaml
          yq eval -i \
            '(.images[] | select(.name == "idoyo7/kanna")).newTag = strenv(IMAGE_TAG)' \
            "$KUSTOMIZATION"
          echo "=== updated ${KUSTOMIZATION} ==="
          cat "$KUSTOMIZATION"

      # 7. montstrap 레포에 커밋 & 푸시 (ArgoCD auto-sync 트리거)
      - name: Commit and push to montstrap
        working-directory: montstrap
        run: |
          git config user.name "kanna-the-finale CI"
          git config user.email "ci-bot@users.noreply.github.com"
          git add stage/kanna/manifests/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "🚀 kanna stage: bump image tag to ${{ env.IMAGE_TAG }}"
          git push origin main
